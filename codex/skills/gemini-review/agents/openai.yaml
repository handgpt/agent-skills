interface:
  display_name: "Gemini Review"
  short_description: "Advisory Gemini review for diffs, safe simplifications, and structural risks at important checkpoints"
  default_prompt: "Use $gemini-review to get a concise Gemini review after code changes are complete. At important checkpoints, ask it to run in structural mode so it inspects code structure and module boundaries in addition to the diff."
policy:
  allow_implicit_invocation: true
